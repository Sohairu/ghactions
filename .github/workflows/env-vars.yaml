name: Greeting on variable day

on:
  workflow_dispatch

env:
  Day: 7
  Month: April

jobs:
  greeting_job:
    runs-on: ubuntu-latest
    env:
      Day: 8
      Greeting: Hello
      Month: March
    steps:
      - name: Greet
        run: echo "$Greeting $First_Name. Today is $Day of $Month!"
        env:
          First_Name: Ahmad
          Greeting: Salam
          Month: May

  greeting_job_win:
    runs-on: windows-latest
    env:
      Greeting: Hello
    steps:
      - name: Greet
        run: echo "$env:Greeting $env:First_Name. Today is $env:Day of $env:Month!"
        env:
          First_Name: Ahmad
          Greeting: Salam
          Month: May

  greeting_job_python:
    runs-on: windows-latest
    env:
      Greeting: Hello
    steps:
      - name: Greet
        run: |
          import os

          msg = "{} {}. Today is {} of {}!"
          print(msg.format(os.getenv("Greeting"), os.getenv("First_Name"), os.getenv("Day"), os.getenv("Month")))
        shell: python
        env:
          First_Name: Ahmad
          Greeting: Salam
          Month: May
